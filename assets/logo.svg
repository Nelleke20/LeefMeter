<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#3949AB" />

  <!-- Meter arc (background track) -->
  <path d="M 20 80 A 44 44 0 0 1 100 80" fill="none" stroke="#ffffff33" stroke-width="10" stroke-linecap="round"/>

  <!-- Meter arc segments (rust=blue, laag=green, gemiddeld=amber, zwaar=red) -->
  <path d="M 20 80 A 44 44 0 0 1 38 44" fill="none" stroke="#90CAF9" stroke-width="10" stroke-linecap="round"/>
  <path d="M 38 44 A 44 44 0 0 1 60 36" fill="none" stroke="#A5D6A7" stroke-width="10" stroke-linecap="round"/>
  <path d="M 60 36 A 44 44 0 0 1 82 44" fill="none" stroke="#FFE082" stroke-width="10" stroke-linecap="round"/>
  <path d="M 82 44 A 44 44 0 0 1 100 80" fill="none" stroke="#EF9A9A" stroke-width="10" stroke-linecap="round"/>

  <!-- Needle -->
  <line x1="60" y1="80" x2="78" y2="46" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="60" cy="80" r="5" fill="white"/>

  <!-- Label -->
  <text x="60" y="100" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">LEEFMETER</text>
</svg>
